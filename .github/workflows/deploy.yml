# Automated Static CD workflow for Vite Portfolio
name: Deploy static frontend to GitHub Pages

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Set up Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Clean Dependencies
        run: npm ci

      - name: Compile Distribution Asset Bundle
        run: npm run build
        env:
          # Automatically attaches remote backend if defined in GitHub actions secrets
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Deploy static assets directory to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
